<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kavach 2.0 — AI Fraud Detection</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;height:100vh;overflow:hidden;background:#111}
.app{display:flex;height:100vh;max-width:1440px;margin:0 auto;box-shadow:0 0 80px rgba(0,0,0,.6)}

/* SIDEBAR */
.sidebar{width:380px;background:#fff;border-right:1px solid #e0e0e0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar-head{background:#075e54;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;min-height:60px}
.sidebar-head h2{color:#fff;font-size:17px;font-weight:600;letter-spacing:-.3px}
.sidebar-head .ver{color:rgba(255,255,255,.65);font-size:11px}
.lang-bar{padding:10px 16px;background:#f6f6f6;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;gap:8px}
.lang-bar label{font-size:12px;color:#555;font-weight:500}
.lang-bar select{flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;background:#fff;outline:none}
.scenarios{flex:1;overflow-y:auto;padding:8px 0}
.scenario{padding:14px 20px;cursor:pointer;border-bottom:1px solid #f0f0f0;transition:background .15s;border-left:3px solid transparent}
.scenario:hover{background:#f0faf0}
.scenario.active{background:#e8f5e9;border-left-color:#128C7E}
.scenario-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.scenario-name{font-size:14px;font-weight:600;color:#1a1a1a}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-critical{background:#fde8e8;color:#dc3545}
.badge-high{background:#fff3e0;color:#fd7e14}
.badge-medium{background:#fff9e6;color:#e6a800}
.badge-low{background:#e8f5e9;color:#28a745}
.scenario-desc{font-size:12px;color:#888;margin-top:3px}
.scenario-amount{font-size:12px;color:#555;font-weight:500;margin-top:2px}
.sidebar-actions{padding:12px 16px;border-top:1px solid #e8e8e8;background:#fafafa}
.run-btn{width:100%;padding:13px;background:#25D366;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;letter-spacing:.2px}
.run-btn:hover{background:#1fa855;transform:translateY(-1px);box-shadow:0 4px 14px rgba(37,211,102,.35)}
.run-btn:active{transform:translateY(0)}
.run-btn:disabled{background:#aaa;cursor:not-allowed;transform:none;box-shadow:none}

/* CHAT AREA */
.chat-area{flex:1;display:flex;flex-direction:column;background:#efeae2;position:relative}
.chat-head{background:#128C7E;padding:12px 24px;display:flex;align-items:center;gap:14px;min-height:60px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
.chat-avatar{width:40px;height:40px;background:#075e54;border-radius:50%;display:flex;align-items:center;justify-content:center}
.chat-avatar svg{width:22px;height:22px;fill:#fff}
.chat-info h3{color:#fff;font-size:15px;font-weight:600}
.chat-info p{color:rgba(255,255,255,.75);font-size:12px}
.chat-bg{position:absolute;inset:60px 0 0 0;opacity:.04;background-image:url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 5L35 15L45 17L37 25L39 35L30 30L21 35L23 25L15 17L25 15Z' fill='%23000' fill-opacity='.4'/%3E%3C/svg%3E");pointer-events:none}
.messages{flex:1;overflow-y:auto;padding:20px 60px;display:flex;flex-direction:column;gap:6px;position:relative;z-index:1}
.msg{max-width:72%;padding:8px 14px;border-radius:8px;font-size:13.5px;line-height:1.5;position:relative;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-bot{background:#fff;align-self:flex-start;border-top-left-radius:0;box-shadow:0 1px 2px rgba(0,0,0,.08)}
.msg-user{background:#dcf8c6;align-self:flex-end;border-top-right-radius:0;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.msg-system{background:rgba(255,255,255,.85);align-self:center;text-align:center;font-size:12px;color:#555;padding:5px 14px;border-radius:6px;box-shadow:0 1px 2px rgba(0,0,0,.06)}
.msg-time{font-size:10px;color:#999;margin-top:3px;text-align:right}
.msg-bot .msg-time{text-align:left}
.typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.typing span{width:8px;height:8px;background:#90a4ae;border-radius:50%;animation:bounce 1.4s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}

/* BANNERS */
.banner{padding:10px 20px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:10px;animation:slideDown .3s ease}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.banner-alert{background:#fff3cd;color:#856404;border-bottom:1px solid #ffc107}
.banner-recovery{background:#d4edda;color:#155724;border-bottom:1px solid #28a745}
.banner-icon{font-size:18px}

/* RISK CARD */
.risk-card{background:#fff;border-radius:10px;padding:14px 16px;margin:4px 0;box-shadow:0 2px 8px rgba(0,0,0,.08);border-left:4px solid #ddd}
.risk-card.critical{border-left-color:#dc3545}
.risk-card.high{border-left-color:#fd7e14}
.risk-card.medium{border-left-color:#e6a800}
.risk-card.low{border-left-color:#28a745}
.risk-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.risk-label{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.risk-score{font-size:22px;font-weight:700}
.risk-details{font-size:12px;color:#666;line-height:1.6}

/* INPUT BAR */
.input-bar{padding:12px 16px;background:#f0f0f0;display:flex;align-items:center;gap:10px;border-top:1px solid #e0e0e0;position:relative;z-index:1}
.input-bar input{flex:1;padding:12px 18px;border:none;border-radius:24px;font-size:14px;font-family:inherit;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.06);outline:none}
.input-bar input:focus{box-shadow:0 1px 6px rgba(18,140,126,.2)}
.send-btn{width:44px;height:44px;border-radius:50%;background:#128C7E;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.send-btn:hover{background:#075e54;transform:scale(1.05)}
.send-btn svg{width:20px;height:20px;fill:#fff}

/* RESPONSIVE */
@media(max-width:900px){.sidebar{width:280px}}
@media(max-width:700px){.sidebar{display:none}.messages{padding:16px 20px}}
</style>
</head>
<body>
<div class="app">
<!-- SIDEBAR -->
<aside class="sidebar">
<div class="sidebar-head">
<div><h2>Kavach 2.0</h2><span class="ver">AI Fraud Shield</span></div>
<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
</div>
<div class="lang-bar">
<label>Language:</label>
<select id="langSelect">
<option value="hi">Hindi</option>
<option value="en" selected>English</option>
<option value="te">Telugu</option>
<option value="ta">Tamil</option>
<option value="bn">Bengali</option>
</select>
</div>
<div class="scenarios" id="scenarioList"></div>
<div class="sidebar-actions">
<button class="run-btn" id="runDemoBtn" onclick="runSelectedScenario()">&#9654; Run Full Demo</button>
</div>
</aside>

<!-- CHAT -->
<main class="chat-area">
<div class="chat-head">
<div class="chat-avatar"><svg viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg></div>
<div class="chat-info"><h3>Kavach AI Agent</h3><p id="chatStatus">Select a scenario or type a message</p></div>
</div>
<div id="bannerArea"></div>
<div class="messages" id="messages">
<div class="msg msg-system">Welcome to Kavach 2.0 — Select a demo scenario from the left panel or type a message below.</div>
</div>
<div class="input-bar">
<input type="text" id="chatInput" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendChat()">
<button class="send-btn" onclick="sendChat()"><svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg></button>
</div>
</main>
</div>

<script>
const SCENARIOS = [
  {id:1, name:"Digital Arrest Scam", risk:"critical", amount:40000, phone:"+919001000001", lang:"hi", reply:"1", desc:"Fake CBI officer demands immediate transfer", userName:"Rahul Sharma"},
  {id:2, name:"KYC Fraud", risk:"high", amount:15000, phone:"+919001000002", lang:"te", reply:"haan", desc:"Fake bank KYC update with phishing link", userName:"Priya Reddy"},
  {id:3, name:"Safe Transaction", risk:"low", amount:500, phone:"+919001000003", lang:"en", reply:"2", desc:"Legitimate UPI payment to verified merchant", userName:"Amit Patel"},
  {id:4, name:"Fake Police Call", risk:"critical", amount:75000, phone:"+919001000004", lang:"ta", reply:"yes", desc:"Impersonating police officer, threatening arrest", userName:"Lakshmi Iyer"}
];

let activeScenario = null;
let isRunning = false;

function init() {
  const list = document.getElementById('scenarioList');
  SCENARIOS.forEach((s, i) => {
    const el = document.createElement('div');
    el.className = 'scenario' + (i === 0 ? ' active' : '');
    el.dataset.idx = i;
    el.innerHTML = `
      <div class="scenario-top">
        <span class="scenario-name">${s.name}</span>
        <span class="badge badge-${s.risk}">${s.risk}</span>
      </div>
      <div class="scenario-desc">${s.desc}</div>
      <div class="scenario-amount">\u20B9${s.amount.toLocaleString('en-IN')} \u2022 ${s.phone}</div>
    `;
    el.onclick = () => selectScenario(i);
    list.appendChild(el);
  });
  activeScenario = 0;
}

function selectScenario(idx) {
  activeScenario = idx;
  document.querySelectorAll('.scenario').forEach((el, i) => {
    el.classList.toggle('active', i === idx);
  });
  const s = SCENARIOS[idx];
  document.getElementById('langSelect').value = s.lang;
  document.getElementById('chatStatus').textContent = `${s.name} — ${s.userName}`;
}

function getTime() {
  return new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function addMsg(type, html) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-' + type;
  div.innerHTML = html + `<div class="msg-time">${getTime()}</div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function addSystem(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'typing';
  div.id = 'typingIndicator';
  div.innerHTML = '<span></span><span></span><span></span>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function showBanner(type, text) {
  const area = document.getElementById('bannerArea');
  const icons = {alert: '\u26A0\uFE0F', recovery: '\u2705'};
  const div = document.createElement('div');
  div.className = `banner banner-${type}`;
  div.innerHTML = `<span class="banner-icon">${icons[type] || ''}</span><span>${text}</span>`;
  area.appendChild(div);
  setTimeout(() => div.style.opacity = '0.9', 50);
}

function clearChat() {
  document.getElementById('messages').innerHTML = '';
  document.getElementById('bannerArea').innerHTML = '';
}

function buildRiskCard(data) {
  const risk = (data.risk_level || data.risk || 'low').toLowerCase();
  const score = data.risk_score || data.score || 0;
  const colors = {critical:'#dc3545', high:'#fd7e14', medium:'#e6a800', low:'#28a745'};
  const color = colors[risk] || '#888';
  let details = '';
  if (data.scam_type) details += `<strong>Type:</strong> ${data.scam_type}<br>`;
  if (data.message || data.warning) details += `${data.message || data.warning}<br>`;
  if (data.indicators && data.indicators.length) details += `<strong>Indicators:</strong> ${data.indicators.join(', ')}`;

  return `<div class="risk-card ${risk}">
    <div class="risk-header">
      <span class="risk-label" style="color:${color}">\u25CF ${risk.toUpperCase()} RISK</span>
      <span class="risk-score" style="color:${color}">${score}/100</span>
    </div>
    <div class="risk-details">${details || 'Transaction analyzed by Kavach AI'}</div>
  </div>`;
}

async function apiCall(endpoint, body) {
  try {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const text = await res.text();
      console.error(`API ${endpoint} failed:`, res.status, text);
      return {error: true, message: text || `HTTP ${res.status}`};
    }
    return await res.json();
  } catch (e) {
    console.error(`API ${endpoint} error:`, e);
    return {error: true, message: e.message};
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runSelectedScenario() {
  if (isRunning || activeScenario === null) return;
  isRunning = true;
  const btn = document.getElementById('runDemoBtn');
  btn.disabled = true;
  btn.textContent = '\u23F3 Running...';

  const s = SCENARIOS[activeScenario];
  const lang = document.getElementById('langSelect').value;
  clearChat();

  addSystem(`Starting scenario: ${s.name}`);
  document.getElementById('chatStatus').textContent = `${s.name} — Processing...`;

  // Step 1: Setup demo
  addSystem('Setting up demo session...');
  showTyping();
  const setupRes = await apiCall('/api/setup-demo', {phone: s.phone, language: lang, name: s.userName});
  hideTyping();

  if (setupRes.error) {
    addMsg('bot', `<em>Setup note: ${setupRes.message || 'Proceeding with demo...'}</em>`);
  } else {
    addSystem('Session initialized \u2713');
  }

  await sleep(600);

  // Step 2: Intercepting
  addSystem('\uD83D\uDD0D Intercepting transaction...');
  showTyping();
  await sleep(800);

  // Step 3: Initiate transaction
  const txRes = await apiCall('/api/transaction/initiate', {
    phone: s.phone,
    amount: s.amount,
    recipient: "unknown_account",
    language: lang,
    name: s.userName
  });
  hideTyping();

  if (txRes.error) {
    addMsg('bot', buildRiskCard({risk_level: s.risk, risk_score: s.risk==='critical'?92:s.risk==='high'?75:s.risk==='low'?12:50, scam_type: s.name, message: `Demo: \u20B9${s.amount.toLocaleString('en-IN')} transaction flagged`}));
  } else {
    addMsg('bot', buildRiskCard(txRes));
    if (txRes.should_alert_contact) showBanner('alert', '\uD83D\uDEA8 Trusted Contact Alerted — Emergency notification sent');
    if (txRes.should_start_recovery) showBanner('recovery', '\u2705 Recovery Flow Started — Automated complaint filed');
  }

  await sleep(1500);

  // Step 4: User reply
  addMsg('user', s.reply);
  await sleep(500);

  // Step 5: Chat response
  showTyping();
  const chatRes = await apiCall('/api/chat', {message: s.reply, language: lang, phone: s.phone});
  hideTyping();

  if (chatRes.error) {
    const fallbacks = {
      critical: "This transaction has been BLOCKED. Our AI has detected this as a scam. Your bank has been notified and a complaint is being filed automatically.",
      high: "Warning: This transaction shows signs of fraud. We recommend not proceeding. Please verify with your bank directly.",
      low: "Transaction appears safe. Proceeding normally.",
    };
    addMsg('bot', fallbacks[s.risk] || 'Response processed.');
  } else {
    addMsg('bot', chatRes.response || chatRes.message || JSON.stringify(chatRes));
    if (chatRes.should_alert_contact) showBanner('alert', '\uD83D\uDEA8 Trusted Contact Alerted — Emergency notification sent');
    if (chatRes.should_start_recovery) showBanner('recovery', '\u2705 Recovery Flow Started — Automated complaint filed');
    if (Array.isArray(chatRes.recovery_messages)) {
      for (const step of chatRes.recovery_messages) {
        addMsg('bot', step);
        await sleep(300);
      }
    }
  }

  // Final status
  document.getElementById('chatStatus').textContent = `${s.name} — Complete`;
  btn.disabled = false;
  btn.textContent = '\u25B6 Run Full Demo';
  isRunning = false;
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg || isRunning) return;
  input.value = '';

  const lang = document.getElementById('langSelect').value;
  const phone = activeScenario !== null ? SCENARIOS[activeScenario].phone : '+919001000001';

  addMsg('user', msg);
  showTyping();

  const res = await apiCall('/api/chat', {message: msg, language: lang, phone: phone});
  hideTyping();

  if (res.error) {
    addMsg('bot', 'Sorry, I could not process that request. Please try again.');
  } else {
    const text = res.response || res.message || JSON.stringify(res);
    addMsg('bot', text);
    if (res.risk_score || res.risk_level) {
      addMsg('bot', buildRiskCard(res));
    }
    if (res.should_alert_contact) showBanner('alert', '\uD83D\uDEA8 Trusted Contact Alerted');
    if (res.should_start_recovery) showBanner('recovery', '\u2705 Recovery Flow Started');
    if (Array.isArray(res.recovery_messages)) {
      for (const step of res.recovery_messages) {
        addMsg('bot', step);
        await sleep(300);
      }
    }
  }
}

init();
</script>
</body>
</html>
